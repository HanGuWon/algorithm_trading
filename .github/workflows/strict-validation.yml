name: Strict validation

on:
  pull_request:
    paths:
      - ".github/workflows/strict-validation.yml"
      - "scripts/**"
      - "user_data/configs/**"
      - "user_data/pairs/**"
      - "user_data/strategies/**"
      - "docs/validation/strict_gate_spec.md"
      - "docker-compose.yml"
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "smoke"
        type: choice
        options:
          - smoke
          - full
      anchors:
        description: "Optional space-separated anchors. Empty uses dynamic complete 6-month windows."
        required: false
        default: ""
      upload_artifacts:
        description: "Upload validation reports/logs"
        required: true
        default: true
        type: boolean

env:
  FREQTRADE_IMAGE: freqtradeorg/freqtrade:2026.2

jobs:
  smoke:
    name: Smoke validation
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Pull Freqtrade image
        run: docker pull "$FREQTRADE_IMAGE"

      - name: Static smoke gate
        run: |
          docker run --rm \
            --entrypoint python \
            -v "$PWD:/freqtrade" \
            -w /freqtrade \
            "$FREQTRADE_IMAGE" \
            scripts/run_strict_validation.py \
            --skip-freqtrade-checks \
            --skip-backtests \
            --skip-bias \
            --output-md docs/validation/strict_validation_smoke.md \
            --output-csv docs/validation/strict_validation_smoke.csv

      - name: Freqtrade strategy discovery
        run: |
          docker run --rm \
            --entrypoint freqtrade \
            -v "$PWD:/freqtrade" \
            -w /freqtrade \
            "$FREQTRADE_IMAGE" \
            list-strategies \
            --strategy-path user_data/strategies

      - name: Freqtrade config checks
        run: |
          for config in \
            user_data/configs/volatility_rotation_mr_backtest_top50_flush_rebound_longonly.json \
            user_data/configs/volatility_rotation_mr_backtest_top50_delayed_confirm_longonly.json \
            user_data/configs/volatility_rotation_mr_binance_dryrun.json
          do
            docker run --rm \
              --entrypoint freqtrade \
              -v "$PWD:/freqtrade" \
              -w /freqtrade \
              "$FREQTRADE_IMAGE" \
              show-config \
              --config "$config"
          done

      - name: Upload smoke report
        if: always() && (github.event_name == 'pull_request' || inputs.upload_artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: strict-validation-smoke
          path: |
            docs/validation/strict_validation_smoke.md
            docs/validation/strict_validation_smoke.csv

  full:
    name: Full strict validation
    if: github.event_name == 'workflow_dispatch' && inputs.mode == 'full'
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Pull Freqtrade image
        run: docker pull "$FREQTRADE_IMAGE"

      - name: Download data and run strict gate
        run: |
          ANCHOR_ARGS=()
          if [ -n "${{ inputs.anchors }}" ]; then
            read -r -a ANCHOR_VALUES <<< "${{ inputs.anchors }}"
            ANCHOR_ARGS=(--anchors "${ANCHOR_VALUES[@]}")
          fi

          docker run --rm \
            --entrypoint python \
            -v "$PWD:/freqtrade" \
            -w /freqtrade \
            "$FREQTRADE_IMAGE" \
            scripts/run_strict_validation.py \
            --download-data \
            --build-missing-snapshots \
            "${ANCHOR_ARGS[@]}" \
            --output-md docs/validation/strict_validation_gate.md \
            --output-csv docs/validation/strict_validation_gate.csv

      - name: Upload full validation artifacts
        if: always() && inputs.upload_artifacts
        uses: actions/upload-artifact@v4
        with:
          name: strict-validation-full
          path: |
            docs/validation/strict_validation_gate.md
            docs/validation/strict_validation_gate.csv
            docs/validation/logs/strict_validation/**
            user_data/backtest_results/strict_validation/**
